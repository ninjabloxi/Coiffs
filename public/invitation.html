<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Invitation Coiffs</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{
background:white;
width:100%;
max-width:500px;
padding:40px;
border-radius:30px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.logo{
width:120px;
height:120px;
border-radius:50%;
background:#eeeeee;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
font-size:70px;
font-weight:bold;
margin-bottom:25px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.token-title{
font-size:14px;
font-weight:bold;
letter-spacing:1px;
color:#777;
margin-top:25px;
margin-bottom:15px;
}

.token{
background:#f0f0f0;
padding:18px;
border-radius:14px;
font-size:24px;
font-weight:bold;
word-break:break-all;
}

.description{
margin-top:25px;
font-size:18px;
line-height:1.5;
color:#666;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
C
</div>

<h1>
Invitation
</h1>

<div class="token-title">
TOKEN D'INVITATION
</div>

<div
id="token"
class="token">
Chargement...
</div>

<div class="description">

Ouvrez l'application Coiffs.

<br><br>

Allez dans :

<b>Rejoindre une famille</b>

<br><br>

Puis saisissez ce token.

</div>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const token =
params.get("token");

document.getElementById(
"token"
).textContent =
token || "TOKEN INTROUVABLE";

</script>

</body>

</html>
