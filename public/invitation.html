<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
Invitation Coiffs
</title>

<style>

body{

margin:0;
padding:40px;

font-family:sans-serif;

background:#F5F5F5;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

}

.card{

background:white;

padding:40px;

border-radius:20px;

max-width:500px;

width:100%;

text-align:center;

box-shadow:
0 10px 30px rgba(0,0,0,.1);

}

.token{

margin-top:20px;

padding:20px;

font-size:28px;

font-weight:bold;

border-radius:12px;

background:#EFEFEF;

word-break:break-all;

}

</style>

</head>

<body>

<div class="card">

<h1>
Invitation Coiffs
</h1>

<p>

Ouvrez l'application
<b>Coiffs</b>

</p>

<p>

Puis allez dans

</p>

<p>

<b>
Rejoindre une famille
</b>

</p>

<p>

et saisissez le token :

</p>

<div
id="token"
class="token">

Chargement...

</div>

</div>

<script>

const params =
new URLSearchParams(
window.location.search
);

const token =
params.get("id");

document.getElementById(
"token"
).textContent =
token || "Token introuvable";

</script>

</body>
</html>
