<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
Invitation Coiffs
</title>

<meta name="theme-color"
content="#09090B">

<link rel="stylesheet"
href="./style.css">

<link rel="apple-touch-icon"
href="logo.png">

<link rel="icon"
type="image/png"
href="logo.png">

<meta name="apple-mobile-web-app-title"
content="Coiffs">

<meta name="apple-mobile-web-app-capable"
content="yes">

<meta name="apple-mobile-web-app-status-bar-style"
content="black-translucent">

<link rel="manifest"
href="manifest.json">

</head>

<body>



<div id="invitation-page">


<div class="invitation-card">


<img
id="admin-photo"
src="logo.png"
class="profile-picture">



<h1
id="family-name">

Chargement...

</h1>



<p
id="invite-text">

Vous avez été invité à rejoindre une famille Coiffs.

</p>



<div id="token-container">


<p class="small-title">

TOKEN D'INVITATION

</p>


<div id="token-box">

Chargement...

</div>


</div>



<p
id="instruction-text">

Appuyez sur le bouton ci-dessous pour copier votre token et ouvrir Coiffs.

</p>



<button
id="open-button"
class="primary-button">

COPIER ET OUVRIR COIFFS

</button>



<p
id="device-text">

Détection de votre appareil...

</p>


</div>


</div>




<script>



//------------------//
// VARIABLES
//------------------//


let invitationToken = "";

let familyName = "";

let adminPhoto = "";




//------------------//
// APPAREIL
//------------------//


function isAndroid(){

return /Android/i
.test(

navigator.userAgent

);

}


function isApple(){

return /iPhone|iPad|iPod|Mac/i
.test(

navigator.userAgent

);

}




//------------------//
// URL
//------------------//


function getInvitationID(){

const params =

new URLSearchParams(

window.location.search

);


return params.get("id");

}




//------------------//
// CHARGEMENT
//------------------//


window.onload = ()=>{

loadInvitation();

};




//------------------//
// INVITATION
//------------------//


async function loadInvitation(){


try{


const invitationID =

getInvitationID();



if(!invitationID){

showError(
"Invitation invalide."
);

return;

}



const response =

await fetch(

"/api/index",

{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:

JSON.stringify({

action:
"get-invitation",

data:{

id:
invitationID

}

})

}


);



const result =

await response.json();



if(

!result.success

){

showError(

result.message

);

return;

}



familyName =

result.family.name;



adminPhoto =

result.family.adminPhoto;



invitationToken =

result.token;



updatePage();


}

catch(error){

console.error(error);

showError(
"Impossible de charger l'invitation."
);

}


}




//------------------//
// PAGE
//------------------//


function updatePage(){


document.getElementById(
"family-name"
).textContent =

familyName;



document.getElementById(
"token-box"
).textContent =

invitationToken;



if(adminPhoto){

document.getElementById(
"admin-photo"
).src =

adminPhoto;

}



if(isAndroid()){


document.getElementById(
"device-text"
).textContent =

"Android détecté. Coiffs s'ouvrira automatiquement après la copie du token.";


}


else if(isApple()){


document.getElementById(
"device-text"
).textContent =

"Apple détecté. Ouvrez ensuite l'application Coiffs et rejoignez une famille avec votre token.";


}


else{


document.getElementById(
"device-text"
).textContent =

"Appareil non détecté.";

}


}




//------------------//
// ERREUR
//------------------//


function showError(message){


document.getElementById(
"family-name"
).textContent =

"Erreur";


document.getElementById(
"invite-text"
).textContent =

message;


document.getElementById(
"open-button"
).style.display =

"none";


}




//------------------//
// COPIER
//------------------//


async function copyToken(){


try{


await navigator.clipboard.writeText(

invitationToken

);


return true;


}

catch(error){


return false;


}


}




//------------------//
// OUVRIR COIFFS
//------------------//


async function openCoiffs(){


const copied =

await copyToken();



if(!copied){

alert(

"Impossible de copier le token."

);

return;

}



if(isAndroid()){


window.location.href =

`https://coiffs.vercel.app/?token=${invitationToken}`;


return;


}



if(isApple()){


alert(

"Votre token a été copié.\n\nOuvrez maintenant Coiffs puis allez dans 'Rejoindre une famille' et collez votre token."

);


window.location.href =

"https://coiffs.vercel.app";


return;


}



window.location.href =

"https://coiffs.vercel.app";


}




//------------------//
// BOUTON
//------------------//


document.getElementById(
"open-button"
).onclick = ()=>{

openCoiffs();

};


</script>



</body>
</html>
