<!DOCTYPE html>

<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1.0">


<title>Installer Coiffs</title>


<link rel="icon"
href="logo.png">


<style>


*{

box-sizing:border-box;

}



body{

margin:0;

height:100vh;

background:#09090B;

color:white;

font-family:Arial, sans-serif;

display:flex;

justify-content:center;

align-items:center;

}



.container{

width:100%;

display:flex;

flex-direction:column;

align-items:center;

text-align:center;

transform:translateY(-60px);

}



.logo{


width:130px;

height:130px;


border-radius:30px;


box-shadow:

0 20px 45px rgba(90,90,90,0.45);


margin-bottom:45px;


}



h1{


font-size:28px;


margin:0 25px 30px;


}



.install-button{


background:#4285F4;


color:white;


border:none;


border-radius:16px;


padding:16px 55px;


font-size:18px;


font-weight:bold;


cursor:pointer;


}



.install-button:active{


transform:scale(0.96);


}




#tutorial{


display:none;


position:fixed;


top:0;

left:0;


width:100%;

height:100%;


background:#09090B;


align-items:center;

justify-content:center;

flex-direction:column;


padding:30px;


text-align:center;


z-index:10;


}



#tutorial h2{


font-size:26px;


}



#tutorial p{


font-size:18px;


line-height:1.6;


color:#cccccc;


}



.close{


margin-top:30px;


background:#333;


color:white;


border:none;


padding:14px 40px;


border-radius:15px;


font-size:16px;


}



</style>


<!-- Icône iPhone / iPad écran d'accueil -->
<link rel="apple-touch-icon" href="logo.png">

<!-- Nom de l'application -->
<meta name="apple-mobile-web-app-title" content="Coiffs">

<!-- Mode application plein écran -->
<meta name="apple-mobile-web-app-capable" content="yes">

<!-- Couleur de la barre d'état -->
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<!-- Icône Android / navigateurs -->
<link rel="icon" type="image/png" href="logo.png">

<!-- Manifest (optionnel mais recommandé) -->
<link rel="manifest" href="manifest.json">


</head>



<body>




<div class="container">



<img
src="logo.png"
class="logo">



<h1>

Installer l’application Coiffs

</h1>



<button
id="action-button"
class="install-button">

INSTALLER

</button>



</div>







<div id="tutorial">


<h2>

Installer Coiffs

</h2>



<p id="tutorial-text">

</p>



<button
class="close"
onclick="closeTutorial()">

FERMER

</button>


</div>






<script>



const button =

document.getElementById(
"action-button"
);



let installed =

localStorage.getItem(
"coiffs-installed"
);



if(installed){


button.textContent =
"OUVRIR";


}




button.onclick = ()=>{



if(installed){


openApp();


}

else{


showTutorial();


}



};







function openApp(){


window.location.href =
"app.html";


}







function showTutorial(){



const tutorial =

document.getElementById(
"tutorial"
);



const text =

document.getElementById(
"tutorial-text"
);




const apple =

/iPhone|iPad|Mac/i.test(
navigator.userAgent
);



const android =

/Android/i.test(
navigator.userAgent
);




if(apple){


text.innerHTML =

`
1. Appuyez sur le bouton Partager ⬆️<br><br>

2. Descendez puis choisissez<br>
"Sur l’écran d’accueil"<br><br>

3. Appuyez sur Ajouter
`;



}



else if(android){


text.innerHTML =

`
1. Appuyez sur le menu ⋮<br><br>

2. Choisissez<br>
"Ajouter à l’écran d’accueil"<br><br>

3. Validez l’installation
`;



}



else{


text.innerHTML =

`
Ouvrez ce site depuis un téléphone
pour installer Coiffs.
`;



}



tutorial.style.display =
"flex";


}




function closeTutorial(){


document.getElementById(
"tutorial"
).style.display =
"none";



localStorage.setItem(
"coiffs-installed",
"true"
);



button.textContent =
"OUVRIR";


installed = true;


}



</script>



</body>

</html>
